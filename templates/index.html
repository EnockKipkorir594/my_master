{% extends 'base.html' %}

{% block head %}
    
{% endblock %}

{% block body %}
    <div class="content">
        <h1> Task Manager</h1>
        <table class="border-separate border-spacing-3 border border-gray-400 dark:border-gray-500">
            <tr>
                <th class="border border-gray-300 dark:border-gray-600">Task</th>
                <th class="border border-gray-300 dark:border-gray-600">Added</th>
                <th class="border border-gray-300 dark:border-gray-600">Action</th>
            </tr>
            {% for task in tasks %}
                <tr>
                    <td>{{ task.content }}</td>
                    <td>{{ task.date_created.date() }}</td>
                    <td>
                        <a href="/delete/{{ task.id }}">Delete</a>
                        <br>
                        <a href="/update/{{ task.id }}">Update</a>
                    </td>
                </tr>
            {% endfor %}
        </table>
        <form action="/" method="POST">
            <input type="text" name="content" id="content">
            <input type="submit" value="Add Task">

            
        </form>
        <a href="/home" class="btn btn-primary" role="button">Home</a>
    </div>
    
{% endblock %}
